services:
  node1:
    build: .
    container_name: node1
    ## port mapping; simulates machines in port 8080

    ports:
      - "80:8080"
    ## volume mapping, mounting to local machine, manipuate files, shares exact disk space, 
    ##
    volumes:
      - ./:/usr/src/app

    ## STANDARD input open, as soon as text going to be in docker file, 
    stdin_open: true
    tty: true
