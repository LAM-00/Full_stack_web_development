version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: posts-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: postsdb
    command: --max_connections=20 --performance_schema=0 --innodb_buffer_pool_size=64M --innodb_log_buffer_size=8M
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

    # HEALTHCHECK ADDED HERE
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: posts-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: postsdb

    # BACKEND WAITS FOR DB TO BE HEALTHY
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: posts-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
